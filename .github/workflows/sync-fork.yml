name: Sync Fork

on:
  repository_dispatch: # Triggered when a webhook is received
    types: [sync-request]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork Repository
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config user.name "Ru Chern Chong"
          git config user.email "hello@ruchern.dev"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/umami-software/umami.git

      - name: Fetch Upstream Changes
        run: git fetch upstream

      - name: Sync with Upstream
        run: |
          git merge upstream/master -m "Syncing with upstream"
          git push origin master
